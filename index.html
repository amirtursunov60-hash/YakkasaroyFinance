<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- масштаб зафиксирован в обе стороны (min и max), без зума жестами -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1011" />
    <!-- Установленный ярлык (PWA, standalone) на iOS: без этого статус-бар белый.
         black-translucent делает его прозрачным — виден тёмный фон под ним.
         Отступ шапки на высоту статус-бара даёт класс .appTop. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/icons/favicon-64.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Яккасарой · Система управления</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
